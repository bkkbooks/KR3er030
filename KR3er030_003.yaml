body:
  text: 卷下前後虛實圖假令脾肺虛則補其母謂肺病而補其脾也則腎自平矣假令脾肺實則瀉其子謂脾病而瀉其肺也則心自平矣難經云從前來者為實邪從後來者為虛邪從所不勝來者為賊邪從所勝來者為微邪自病者為正邪假令心病中風得之為虛邪傷暑得之為正邪飲食勞倦得之為實邪傷寒得之為微邪中濕得之為賊邪假令心病得脾脈土在火之分也剋火之水退而不敢至火獨旺於南方是從前來者為實邪也假令心病得肝脈木在火之分也土退而不敢至土退而不至則剋火之水隨木而至是從後來者為虛邪也假令脾肺虛脾母能令肺子虛也用理中湯非補脾也脾中補肺也故曰虛則補其母以其脾為生肺之本也則用人參白朮之類大經曰滋苗者必固其根此之謂也假令脾肺實肺子能令脾母實也用瀉黃散非瀉脾也脾中瀉肺也故曰實則瀉其子以其脾為生肺之上源則用梔子石膏之類大經曰伐下者必枯其上此之謂也天和六脈六甲旺脈四時平脈合而用之則天地人三才之道備矣諸經皆言大則病進者何也答曰散而浮大者心也心主無為相火用事是為相應以五服言之王畿中也以王畿言之九重中也君主無為當靜以養血若浮大而出於外非其所宜也以王道言之書云外作禽荒未或不忘經云主不明則十二官危矣此散而浮大者君主兼臣下之權而不知反故曰大則病進南政甲巳所臨之歲司天在泉但見君火在上者上不應在下者下不應北政但見君火在上則下不應在下則上不應在左則右不應在右則左不應當沉而浮當浮而沉也南政以前為左以後為右君也北政以前為右以後為左臣也啓玄子云天地陰陽視之可見何必思諸冥昧演法推求智極心勞而無所得耶難經仲景合而為一仲景先太陽坎陽明後少陽自無形傳有形從外而之內者也仲景之所言天令而暴至者也難經先少陽次陽明後太陽自有形傳無形從內而之外者也故難經之言言雜病而久疾者也仲景叔和合而為一張仲景王叔和仲景言弦澀為陰叔和言弦澀為陽何意大抵弦澀東西也以南北分之故有陰陽之別澀本燥火弦本水少雖有南北之分總而言之則不離諸數為熱諸遲為寒仲景叔和言本兩途非相違背合而論之皆是也仲景所言言傷寒自外而入者叔和所言言五臟自內而出者傷寒從氣而入故仲景以弦脈為陰自艮而之內從外入先太陽也位在東北雜病從血而出故叔和以弦脈為陽自巽而之外從內出先少陽也位在東南北弦胸中痛寒在胃停水滿丹田南目赤叫呼煩躁大腸胃三焦右寸肺關脾尺命門左寸心關肝尺腎寒引飲脈八九至小腸膽弦膀胱南弦理中湯子能令母實北固衛之陽桂枝人參甘草湯凡在右者皆受左克里自右之左主從客變右大腸庚肺辛澀胃戊脾巳緩命門相火洪左心丁小腸丙洪肝乙膽甲弦腎癸膀胱壬沉表自左之右客從主變凡在左者皆克諸右浮克浮沉克沉表裡所當汗下手太陰復主表證卻當汗右行陰二十五度肺大腸脾胃命門心包三焦入里主下左行陽二十五度心小腸肝膽腎膀胱七表主汗足厥陰復主血證卻當下仲景浮汗而沉下右手沉實調胃承氣左手沉實桃仁抵當難經沉汗而浮下右手浮實枳實牽牛左手浮實桃仁四順右手雜病是為之表傷寒是為之裡左手雜病是為之裡傷寒是為之表傷寒入里見標脈則生假令胃病下之脈浮而汗出是也雜病出表見標脈則死假令脾病補之脈弦而面青是也察色脈以定吉凶脈地也色天也地生天則順天生地則逆假令得弦脈而面赤色地生天也地生天則順也兒扶母兮瘥速也假令得弦脈而面黑色天生地也天生地則逆也母抑子兮退遲也色者陰中之陽氣也本乎天脈者陽中之陰氣也本乎地弦有浮沉浮為甲化素言天化泄土沉為乙不化難言地不化泄木泄土者梔子黃柏泄木者防風羌活洪浮者為丙便有水化從其變也洪沉者為丁只是火化從其常也針經甲丙戊庚壬皆變乙丙巳辛癸不變並只言木雜病元無表證者不可言左手有下證只當言右手足陽明中求之傷寒元有表證者可言左手有下證下證者血證也當於足厥陰中求之相合脈經脈之相合各有虛實不可作一體觀之假令洪弦相合洪客也弦主也子能令母實也弦洪相合弦客也洪主也母能令子虛也余藏可以類推之至於手足之經亦相合假令傷寒脈浮緊而帶洪者即手經丙也余仿此假令侮所不勝者挾其勢也脈弦而入金之分非挾火之勢則不敢侵金之分弦而帶數甲終於甲也弦而帶洪壬終於丙也四正脈傷圖脈當有神脈之不病其神不言當自有也脈既病當求其中神之有與無焉謂如六數七極熱也脈中有力即有神也三遲二敗寒也脈中有力即有神也熱則有神當泄其熱則神在焉寒則有神當去其寒則神在焉寒熱之脈無力無神將何藥而泄熱去寒乎苟不知此而遽泄去之將何依以生所以十亡八九故經曰脈者血氣之先又云血氣者人之神可以不謹養乎不可不察其有無乎治病必當求責假令治病無問傷寒蓄血結胸發黃等病諸證並一切雜證各當於六經中求責之謂如發黃證或頭痛腰脊強惡寒即太陽證也或身熱目疼鼻乾不得臥即有陽明證也余皆仿此更有手足經或一經非本家病而自他經流入者亦當求責謂如手陽明流入足陽明是上流下也本非足經病當於手經中求之是知治足經者非也亦有下而流上者其餘諸經相實通者皆然更有支別流入者亦有同鄰而病者合為表裡者鄰也亦有夫婦各相傳受者甲傳巳之類脾傳胃之類亦是皆當求責之凡言虛實皆當於子母中求責之治病必求其本假令腹痛桂枝加芍藥大黃桂枝加大黃何為不只用芍藥大黃之屬卻於桂枝湯內加之大抵治病必求其責知從太陽中來故以太陽為本也又如結胸證自高而下脈浮者不可下故先用麻黃湯解表已脈沉然後以陷胸湯下之是亦求其本也至於蓄血下焦血結膀胱是亦從太陽中來侵盡無形之氣乃侵膀胱中有形血也形不足者溫之以氣精不足者補之以味謂寒傷形熱傷氣形氣能自傷也此云不足者皆太過也以其太過則自傷自傷則不足矣金匱真言云冬按蹺四時各有病者何蓋五臟之陽氣皆伏於腎中動有深淺隨行動而病故於四時而各異也痛隨利減諸痛為實痛隨利減世皆以利為下之者非也假令痛在表者實也痛在裡者實也痛在血氣者亦實也在表者汗之則痛愈在裡者下之則痛愈在血氣者散之行之則痛愈豈可以利字只作下之乎但將利字訓作通字或訓作導字則可矣是以諸痛為實痛隨利減汗而通導之利也下而通導之亦利也散氣行血皆通導而利之也故經曰諸痛為實痛隨利減又曰通則不痛痛則不通此之謂也抑本假令高者抑之非高者固當抑也以其本下而失之太高故抑之而使下若本高何抑之有假令下者舉之非下者固當舉也以其本高而失之大下故舉之而使高若本下何舉之有虛實假令水在木之分是從後來從後來者為虛邪雖在水為虛邪則木本虛矣經曰母能令子虛假令火在水之分是從前來從前來者為實邪雖在火為實邪則木本實矣經曰子能令母實假令兩手脈中弦無表證乃東方實也是西方肺氣大不足也緣母虛所致也當大補其脾微補其肺大泄其火微泄其水雜證諸論云先調其氣次論諸疾況此乃本經不足之證也難經云東方實是西方虛也又云欲泄其邪先補其虛此之謂也如是之證當以溫藥補脾以氣藥燥劑為用如正氣已勝當以泄火泄風之藥清高涼上勿令入胃中此為全治益黃白朮半夏茯苓甘草酒病得之加澤瀉手足陽明二燥用益黃者燥濕而補其氣也實泄黃也泄火木泄青之類羌活防風生地黃黃連等分黃芩倍之凡用藥補即用各方之生數理中丸建中湯是也瀉即用各方之成數七宣丸七聖丸是也問兩手寸關弦疾脾弱火勝木旺土虧金爍當作何治答曰不從標本從乎中治也木標也土本也火中也爍金虧土旺木者皆火也仲陽安神丸主之山芋門冬益金之氣金氣勝則木自平凝水石牙硝火中添水使變為濕熱也濕熱者季夏之令也非土而何故用硃砂以墜火下行是巳將退與子權行濕令也是以弦得除而土自旺也秋喘加人參與丹砂等夏則不加養氣者加沉香欲發汗者臨臥先服白粥一杯後藥之則汗也寒熱神少振搖小便淋或多或少大便走完穀不化口乾舌縮唇吻有瘡心下痞大渴引飲惡干喜濕目花四肢無力怠惰嗜臥食不入皮膚燥澀面色黧黑肌肉銷鑠胸腹中急額上汗出此法泄火益濕補氣脈弦浮沉同治氣不化小便不利濕潤肌滑熱蒸陰少氣不化氣走小便自利燥肌燥澀為迫津液不能停離朱丹主之弦數者陽陷於內從外而之內也弦則帶數甲終於甲也緊則帶洪壬終於丙也若弦虛則無火細則無水此二脈從內之外也不宜離朱丹泄瀉壬血土火令逆行而土虛土虛則長夏不至難經曰虛則補其母經曰資其化源當瀉火於火中木併火之勢克脾侮金當金中瀉火侮所不勝弦欺金補土是也右寸顯弦數脈是東方木既乘火勢而來侮金當金中實乃乘子勢也既瀉其瀉火火退則木無所主而自退火木自虛矣以寒藥瀉也是實則瀉其子火是補北方水也水六月大熱之氣反得大寒之病氣難布息身涼脈遲二三至何以治之答曰病有標本病為本令為標用寒則順時而失本用熱則從本而逆時故不從標本而從乎中治中治者用溫也然則溫不能救大寒之病用姜附則不可若用姜附似非溫治之不然衰其大半乃止脈反四至余病便天令治之足矣雖用姜附是亦中治也非溫而何經曰用熱遠熱雖用之不當然勝主可化亦其理也東南二方用麻黃謂開腠理髮汗也西北二方用桂枝謂閉腠理止汗也素問咳論一十一證各隨臟腑湯液之圖久咳不已三焦受之其狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾面浮腫氣逆也錢氏異功散素問五臟瘧證湯液之圖瘧之為病以暑舍於榮衛之間得秋之風寒所傷而後發亦有非暑感冒風寒而得之者邪並於陽則發熱來水不能涼邪並於陰則發寒湯火不能溫並則病作離則病止作止故有時在氣則發早在血則發晏淺則日作深則間日或在頭項或在背中或在腰脊雖上下遠近之不同在太陽一也或在四肢者風淫之所及隨所傷而作不必盡當風府也先寒而後熱者謂之寒瘧先熱而後寒者謂之溫瘧二者不當治水火當從乎中治中治者少陽也渴者燥勝也不渴者濕勝也瘧雖傷暑遇秋而發其不應也秋病寒甚太陽多也冬寒不甚陽不爭也春病則惡風夏病則多汗汗者皆少陽虛也其病隨四時而作異形如此又有得之於冬而發之於暑邪舍於腎足少陰也有藏之於心內熱素於肺手太陰也至於少氣煩冤手足熱而嘔但熱而不寒謂之痹瘧足陽明也治之奈何方其盛矣勿取必毀因其衰也事必大昌治法易老瘧論備矣治當順時夏天氣上行秋天氣下行治者當順天道謂如先寒後熱太陽陽明病白虎加桂也此天氣上行宜用之若天氣下行則不宜瀉肺宜瀉相火命門則可矣亦有內傷冷物而作者當先調中後定瘧形治隨應見乃得康寧亦有久而不瘥者當求虛實以脈為期虛補實瀉可使卻疾此之謂也素問六經瘧候湯液之圖問素問難經銅人經絡所病各異者如用針當從何法答曰素問者從天之六氣言也難經者從地之血脈言也銅人者從經言人也從天而言先氣而後血從地而言亦先氣而後血從天而言在天地之間從地之病而言即地中之氣病故血從而病也從天而言先是動後所生從地而言亦先是動而所生之病後也問寒病服熱藥疾有自誤或始不早治日數久淹或困乃求醫法不及用病勢已盈豈為天命病有變怪仲景平脈法第二及診得脈形證相應因與服湯食頃變大吐下腹痛是為變怪或有舊時服藥今乃作發是亦謂之災怪耳喘論此論當以經言邪氣盛則實斷之華他云盛而為喘減而為枯故活人亦云發喘者氣有餘也凡看文字須得會得本意盛而為喘者非肺氣盛也喘為肺氣有餘者亦非氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛又為有餘則當清肅下行而不喘以其火入於肺衰與不足而為喘焉故言盛者非言肺氣盛也言肺中之火盛也言有餘者非言肺氣有餘也言肺中之火有餘也故瀉肺以苦寒之劑非瀉肺也瀉肺中之火實補肺氣也用者不可不知桔梗枳殼湯活人書言治痞當知是痞宜先用桔梗枳殼湯非用此以治心下痞也審知錯下必成痞證是氣將陷而過於胸中故先用此使不致於痞也若已成痞而用此則失之晚矣不惟不能消痞胸中之氣反病矣先之一字預早之意也先用枳殼湯若不應後以仲景痞藥治之則可若執枳殼湯以治痞其害亦深矣先之一字不可不知也尋衣撮空何臟所主尋衣撮空許學士說作肝熱風淫末疾故手為之尋衣撮空此論雖然莫若斷之為肺熱似為愈矣其人必譫語妄言經曰肺入火為譫言兼上焦有疾肺必主之手經者上焦也二者皆當其理果何如哉天地互為體用此肺之體肝之用肝主諸血血者陰物也此靜體何以自動蓋肺主諸氣為氣所鼓舞故靜得動一者說肝之用一者說肺之體此天地互為體用二者俱為當矣是知肝臟血自寅至申行陽二十五度諸陽用事氣為肝所使肺主氣自申至寅行陰二十五度諸陰用事血為肺所用三法五治論若五治不分邪僻內作工不能禁夫治病之道有三法焉初中末也初治之道法當猛峻者謂所用藥勢疾利猛峻也緣病得之新暴感之輕得之重皆當以疾利猛峻之藥急去之中治之道法當寬猛相濟為病得之非新非久當以緩疾得中之養正去邪相兼濟而治之養正去邪者假令如見邪氣多正氣少宜以去邪藥多正氣藥少凡加減藥法如此之類更以臨時對證消息增減用藥仍依時令行之無忌也更加針灸其效甚速末治之道法當寬緩寬者謂藥性平善廣服無毒惟能養血氣安中蓋為病證已久邪氣潛伏至深而正氣微治故以善藥廣服養正多而邪氣自去更加以針灸其效必速夫療病之道有五治法焉和取從折屬也一治各有五五五二十五治如大之屬衰於戌金之屬衰於辰是也一治曰和假令小熱之病當以涼藥和之和之不已次用取二冶曰取為熱勢稍大當以寒藥取之取之不已次用從三治曰從為勢既甚當以溫藥從之為藥氣溫也味隨所為或以寒因熱用味通所用或寒以溫用或以發汗之不已又再折四治曰折為病勢極甚當以逆制之逆制之不已當以下奪之下奪之不已又用屬五治曰屬為求其屬以衰之緣熱深陷在骨髓間無法可出針藥所不能及故求其屬以衰之緣屬之法是同聲相應同氣相求經曰陷下者衰之夫衰熱之法同前所云火衰於戌金衰於辰之類是也如或又不已當廣其法而治之譬如孫子之用兵若在山谷則塞淵泉在水陸則把渡口在平川廣野當青野千里塞淵泉者刺俞穴把渡口者奪病發時前青野千里者如肌羸瘦弱宜廣服大藥以養正夫病有中外治有緩急在內者以內治法和之氣微不和以調氣法調之在外者以外治法和之其次大者以平氣法平之盛甚不已則奪其氣令其衰也故經曰調氣之方必別陰陽定其中外各守其鄉內者內治外者外治微者調治其次平治盛者奪之汗者下之面部形色之圖察色分位坤胃遺散至腎死兌肺乾大腸遺散至肝死額離心坎腎頤精明五色巽膽遺散至脾死震肝艮小腸遺散至肺死天元圖七十四難曰從其首系其數間象在表五化疊元以應望聞肝青大敦水井臊白泉水合酸中封金經呼大沖土俞泣行間水滎心赤少府火榮焦少衝木井苦少海水合言靈道金經汗神門土俞脾黃太白土俞香大都火榮甘隱白水井歌陰陵泉水合涎商丘金經肺白經渠金經腥大淵土俞辛魚際火榮哭少商水井涕天澤水合腎黑陰谷水合腐復溜金經咸太溪土俞呻然谷火榮液湧泉水井地元圖六十八難曰元證脈合復生五象井心下滿膽元證身熱體重節痛喘嗽寒熱逆氣泄榮身熱心下滿小腸元證體重寒熱逆氣俞體重節痛心下滿胃身熱元證寒熱逆氣經喘咳寒熱心下滿大腸身熱體重元證逆氣合逆氣而泄心下滿膀胱身熱體重寒熱元證假令膽病善潔面青善怒元證得弦脈脈合又病心下滿當刺膽井如見善潔面青善怒脈又弦又病身熱當利膽榮又病體重節痛當刺膽俞如見善潔面青善怒脈又弦又病喘咳寒熱當刺膽合余經例仿此假令肝經淋溲便難轉筋春刺井夏刺榮秋刺經冬刺合人元例六十五難說合七十三難說榮在經木火土金水再分七象以應切脈獨包七法有陰陽配合父子兄妹接經平經說象拔源陰陽例陰陽者子午也謂滎合水火之稱名曰陰陽也十二經皆有之或感得父氣或感得母氣而病焉子午者乾坤也乾坤包六子六子附乾坤也故七十難云春夏各致一陰秋冬各致一陽春夏刺井榮秋冬刺經合是各致一陰一陽之義亦謂井經近乎子午然當微瀉其井大瀉其榮微補其經大補其合或補瀉反作是寒則留之熱則疾之故微大補瀉以應春食涼夏食寒秋食溫冬食熱假令膽病善潔面青善怒脈得浮之實大沉之損小是感得父氣為陽中之陽當於本經中瀉火補水卻得浮之損小沉之實大是感得母氣為陰中之陽當於本經中瀉水補火配合例七十七難曰上工治未病者見肝之病則知肝當傳於脾故先實其脾氣無令受肝之邪氣也假令見肝病欲實其脾者先於足太陰經中補土字一針又補火字一針後於足厥陰肝經內瀉木字一針又瀉火字一針子母例假令見肝病滿悶淋溲便難轉筋又見心病煩心心痛掌中熱而噦當於足厥陰肝經內木火二字各一針兄妹例以上子母兄妹名曰四針象假令見足厥陰肝之經太過又兼見膽之證太過是為兄妹當瀉肝經內木火二字各一針又瀉膽經內木火二字各一針此五法乃人元法也接經手足經同內經曰留瘦不移節而刺之使十二經無過絶假令十二經中是何經略不通行當刺不通行凝滯經俱令接過節如刺之無問其數以平為期如諸經俱虛補十二經如諸經俱實瀉十二經補當隨而濟之瀉當迎而奪之平經說象七十九難為見諸經中無過與不及之病而有病八十難曰有見如入謂左手見氣來至乃納針針入見氣盡乃出針非用迎隨補瀉之法不虛不實不虛謂真氣未虛不實謂邪氣未實以此故自取其經施其法也拔源例假令針本經病了又於本經原穴亦針一針如補肝經亦於肝原穴上補一針如瀉肝經來亦於肝經原穴上瀉一針如余經有補瀉針畢仿此例亦補瀉各經原穴接經補遺又補其母亦名隨而濟之又瀉其子亦名迎而奪之又隨呼吸出納亦名迎隨也兩脅痛少陽丘虛心痛少陰太溪並湧泉足厥陰原穴腰痛崑崙委中出血喘滿痰實如膠太溪嘔噦無度手厥陰大陵頭痛手足太陽原熱無度不可止陷谷出血小腸疝氣痛足厥陰太衝百節痠疼實無所知三稜刺絶骨出血婦人血不止刺足太陰井喉閉手足少陽井並少商手足太陰井大煩熱不止晝夜無力刺十指間出血謂八陽大節眼發睛欲出亦須大刺目痛大眥痛刺太陽井頭中痛不可忍卒疝痛婦人陰中痛皆刺足厥陰井目痛小眥痛刺少陽井心痛脈沉腎原穴脈弦肝原穴澀脈肺原穴緩脈脾原穴身之前足陽明原穴身之後足太陽原穴身之側足少陽原穴灸一身之內分為八方臍以上至鳩尾以年為壯大椎以下至腰中以年為壯腰手足四分自井為一榮為二至合為五之類自膽中分四向如井榮數倍之百會為一分亦如膽中法凡欲灸者先診其脈若浮者不可灸灸之必變月晦前後各二日屬坤為癸乙月缺無瀉月望前後各二日屬乾為甲壬月滿無補初三日至上弦屬震仰孟為庚上弦日至月望屬兌上缺為丁月望日至下弦屬巽為風為辛下弦日至月晦屬艮納雨為丙天元圖七十四難曰從其首系其數間象在表五化疊元並見前圖拾遺夫天元法者謂之五化疊元當從其首系其數首者寅方春也在人為肝是從東方順天輪數至所主之處計從幾數卻於所受病一方倒疊回去數至依前數盡處便於元受病一方穴內瀉所止之方來路穴也不得於所主之方內經中瀉之勿誤假令病者聞香臭二者心主五臭也入脾為香臭從東數至所主之處所主五臭者心也東一南二計得二數卻當於受病之方倒疊回去脾一心二元數二也是數至心心者榮火也當於受病之方內瀉榮火是脾經瀉火都是也或曰何以倒疊數對曰此從地出為天輪所載右遷於天不當於所顯之虛治之此舟行岸移之意也地元圖六十八難曰元證脈合復生五象在表間象以應望聞及肝膽各五法並見前圖人元法例前圖已載七象七法見前人元例後並見前圖大接經從陽引陰足太陽膀胱經之脈出於至陰小指外側去爪角如韭葉為井金足小指之端也十呼足少陰腎之脈湧泉足心也起於小指之下斜趣三呼手厥陰心包脈其直者循中指出其端去爪甲如韭葉陷中為井中衝穴也其支者別掌中循小指次指出其端手少陽三焦之脈起於小指次指之端去爪甲如韭葉為井三呼足少陽膽之脈起於竅陰小指次指之端去爪甲如韭葉為井其支者上入大指岐骨內出其端還貫爪甲出三毛三呼二十呼足厥陰之脈起於大指之端入聚毛之際去爪甲如韭葉為井大敦穴也及三毛中十呼六呼手太陰肺之脈起於大指之端出於少商大指內側也去爪甲角如韭葉為井其支者出次指內膁出其端手陽明大腸之脈起於大指次指之端入次指之內去爪甲角如韭葉為井一呼中指內交三呼足陽明胃之脈起於大指次指之端去爪甲如韭葉為井其支者大指間出其端一呼足太陰脾之脈起於足大指端循指內一側去爪甲角如韭葉為井隱白也十呼手少陰心之脈起於小指內出其端循指內臁之端去爪甲角如韭葉為井三呼手太陽小腸之脈起於小指之端循指之端去爪甲一分陷中為井五呼大接經從陰引陽手太陰脈之脈起於大指端出於少商大指內側也去爪甲角如韭葉為井其支者出次指內臁出其端手陽明大腸之脈起於大指次指之端入次指內側去爪甲如韭葉為井一呼足陽明胃之脈起於大指次指之端去爪甲如韭葉為井呼其支者大指出其端足太陰脾之脈起於足大指端循指內側去爪甲角如韭葉為井隱白也手少陰心之脈起於小指內出其端循指內臁之端去爪甲角如韭葉為井手太陽小腸之脈起於小指之端去爪甲下一分陷中為井足太陽膀胱之脈出於至陰小指外側去爪甲角如韭葉為井金足小指之端也足少陰腎之脈起於小指之下為井湧泉穴也手厥陰心包之脈其直者循中指出其端去爪甲角如韭葉陷中為井中衝穴也其支者別掌中循小指次指出其端手少陽三焦之脈起於小指次指之端去爪甲角如韭葉為井足少陽膽之脈出於竅陰足小指次指之端如韭葉為井其支者上入大指岐骨內出其端還貫爪甲出三毛足厥陰肝之脈起於大指之端入聚毛之際去爪甲如韭葉為井大敦及三毛中六呼凡此大接經從陰引陽從陽引陰東垣二十五論後録諸經頭痛陽明頭痛自汗發熱白芷少陽頭痛脈弦往來寒熱柴胡太陽頭痛惡風惡寒川芎太陰頭痛痰實體重腹痛半夏少陰頭痛手三陰三陽經不流行而足寒逆為寒厥頭痛細辛厥陰頭痛項痛脈微浮緩欲入太陽其疾痊矣然而亦當用川芎氣虛頭痛黃耆血虛頭痛當歸諸氣血俱虛頭痛黃耆當歸傷寒頭痛無汗麻黃湯有汗桂枝湯太陽經所發陽明頭痛白虎湯少陽頭痛柴胡湯太陰頭痛脈浮桂枝湯脈沉理中湯少陰頭痛脈沉微熱麻黃附子細辛湯厥陰頭痛外傷本經桂枝麻黃各半湯嘔而微吐水吳茱萸湯內亦病也易老曰非白朮不能去濕非枳實不能消痞非天雄不能補上焦之陽虛非附子不能補下焦之陽虛治目不能遠視能近視或亦妨近視或脈風成癘地芝丸主之生地黃爆干四兩天門冬湯炮去心枳殼麵炒去穰二兩甘菊花未開者稱二兩上為細末煉蜜丸如梧桐子大如能飲食茶清湯下不能飲食溫酒下食後改熟地黃亦可此說亦見病喎氣直目門下亦有治目不能近視反能遠視服局方定志丸目能遠視責其有火不能近視責其無水法當補腎目能近視責其有水不能遠視責其無火法當補心補腎補足少陰補心補手少陰補腎六味地黃丸加牡蠣補心定志丸加茯苓不能近視晨服地黃丸不能遠視臥服定志丸治精滑久不愈固真丸手足少陰經不能遠視臥服定志丸單牡蠣不以多少砂鍋子內煆醋淬七遍為末醋糊為丸如梧桐子大每服五十丸空心鹽湯下六脈俱弦指下又虛脾胃虛弱痛也食少而渴不已心下痞腹中痛或腹中狹窄如繩束之急小便不利大便不調精神短少此藥專治大渴不止腹中窄狹所食減少大有神效白茯苓去皮陳皮去白人參生薑先用滾湯掠過焙乾各稱一兩秋時減姜一半如脈弦或腹中急甚加甘草三錢上同為末煉蜜為丸如彈子大每服一丸白湯化下食前空心細嚼白湯送下亦可忌生冷硬物及怒發思慮過節六脈沉緊按之不鼓膀胱勝小腸也或瀉利不止而腹脹或純便血赤血或雜膿血便雖多而不渴精神短少或面白脫色此失血之故或面黃而氣短此元氣損少之故且小腸者手太陽經丙火也膀胱者足太陽經壬水也是壬水來丙小腸之位小腸為壬所克而外走也諸手經短而足經長兼以五行相剋論之俱是足經此火投於水大寒之證宜溫之則愈其與難經一證寒熱相反亦名曰小腸瀉亦作泄海藏云此雜病火投於水變為寒證又外傷足太陽膀胱經左脈俱浮為表陽之候也忽變為內寒亦旺火投盛水而屈丙就壬化脈反不浮而微沉此內病與外病俱有此火投水例非精於脈診者孰能知之姜附赤石脂硃砂丹生附子半兩生乾薑半兩不泡硃砂一兩另研赤石脂一兩半水飛上為細末酒糊丸如黑豆大每服十五丸至二三十丸米飲湯下茯苓煎湯下尤妙東垣云因看盧氏醫鏡見此一藥味數分兩同惟丹砂用伏火者及治病有瘥所治者小便數而不禁怔忡多忘魘夢不已不同耳見其不同審而詳之乃得此之治法不瘥且泛舉之經言腎主大小便肝主小便淋溲難經云小腸為赤腸是面赤色及便溺赤色者皆出心與小腸南方赤色顯於外也經言下焦如瀆者正謂大小便也大便為陰為有形乃下焦之下者也腎臟病為腎主大便不言大腸者明子行父之道小便為氣所化乃下之高者也謂肝主小便淋溲亦是子行父道為腑病諸氣化者皆腑諸有形血化者皆臟病所主此腑言膀胱病二證俱在下焦則同染有形無形及在腑在臟有殊俱是丹田衰敗不言及心火者以其相火化行君之令故也細分之則膀胱壬水勝丙小腸者是不傳入陰故泄血泄血利不禁為有形質病且不傳陰則陰不病何為有形病此為陰之體也為腑之用也天地陰陽互為體用以斯可見是明五臟者為六腑所用六腑為五臟所用明矣是有形皆為傳陰也夫小便不禁是膀胱不約為遺溺此不傳陰也是丹田胞絡受寒為壬所克大抵諸腑皆盛有形物有形病者在腑責其所來皆在臟也用伏火丹砂者去其寒性耳治法同者以其俱在下焦補諸形火同在胞絡耳以其胞與腎相對有渠相通故也腎主大便肝主小便所治安得不殊經曰腎肝同歸一治經又云少陽主骨所生病膀胱卻主節所生病亦可知也小便不禁茯苓湯下大便有病米飲湯送下凡臟腑之祕不可一例治有虛祕有實祕實祕者能飲食小便赤麻仁丸七宣丸之類主之胃虛而祕者不能飲食小便清厚朴湯主之厚朴生薑制白朮五兩枳實麥皮炒一兩陳皮三兩甘草炙三兩半夏曲三兩上為粗末每服五錢水一盞半生薑五片棗三枚煎至一盞空心服實祕者物也虛祕者氣也脈中少有力浮則似止胸中元氣不及也加人參五味子麥門冬益智仁沉香丁香川芎白豆蔻氣血弱者不可服枳殼以損其氣也氣血盛者不可服丁香以盛其益氣也脈弦而虛不可損氣脈大而實不可益氣氣虛則生脈散氣實則三才丸地之濕氣感則害人皮肉筋脈內托散主之以其外受也膏粱之變足生大丁辛甘之過也七聖散主之以其內發也去桂加當歸瘡腫消者生薑自然汁調輕粉塗之諸瘡有惡肉者膏藥內入巴豆雄黃少許不傷艮肉止去惡肉不惟惡瘡若癰疽有死肉不能去者巴豆霜上之深則紝之淺則乾摻之以膏藥外護之大效梔子黃經云無陽則陰無以芩黃連生無陰則陽無以化芍藥黃又云膀胱者津液之柏大黃府氣化則能出矣陳皮厚朴藿香白芷有一身盡熱乾薑丁香肉有一身盡寒桂附子沉香有一身盡寒大頭痛論夫大頭痛者雖為在身在上熱邪伏於已又感天地四時非節瘟疫之氣所著所以成此疾至於潰裂膿出而又染他人所以謂之疫癘也大抵足陽明邪熱大甚資實少陽相火為之熾多在少陽或在陽明甚則逆傳太陽視其腫勢在何部分隨其經而取之濕熱為腫木盛為痛此邪發於首多在兩耳前後所先見出者為主為根治之宜早藥不宜速恐過其病上熱未除中寒已作有傷人命矣此疾是自內而之外也是為血病況頭部受邪現見於無形之處至高之分當先緩而後急先緩者謂邪氣在上所著無形之分既著無形所傳無定若用重劑大瀉之則其邪不去反過其病矣雖用緩藥若急服之或食前或頓服咸失緩之體則藥不能騰升徐潰無形之邪或藥性味形狀擬象服餌皆須不離緩體及寒藥或炒或酒浸之類皆是也後急者謂前緩劑已經高分瀉邪氣入於中是到陰部入於中染於內之有形質之所若藥不速去反損陰分此中治卻為客熱所當急也治客以急此之謂也治主以緩先緩謂也謂陽邪在上陰邪在下各為本家病不從先後錯其緩急不惟不能解其紛而復致其亂矣此所以治主當緩治客當急謂陽分受陽邪陰分受陰邪者主也陽分受陰邪陰分受陽邪者客也凡所謂急者當急去之此治客以急也假令少陽陽明之為病少陽者謂邪出於耳前後也陽明者首面大腫也先以黃芩黃連甘草通炒銼煎少少不住服呷之或一劑畢再用大黃或酒浸或煨又以鼠黏子新瓦上炒㕮咀煎成去渣納芒硝各等分亦時時呷之當食後用徐得微利並邪氣已只服前藥如不已再服後藥依前次第用之取利已卻止如陽明渴者加石膏少陽渴者加栝蔞根湯陽明行經加升麻葛根芍藥之類選而加之太陽行經加羌活荊芥防風之類選而加之並與上藥相合用之不可獨用散者散也此一節亦見病機氣宜治洪長伏三脈風癇驚癇發狂惡人與火者灸第三顀第九顀服局方妙香丸以針投眼子透令水內浸少時服之如本方法治弦細緩三脈諸癇似狂李和南五生丸大凡治雜病先調其氣次療諸疾無損胃氣是其要也若血受病亦先調氣謂氣不調則血不行又氣為之綱夫也夫不唱婦不隨也如婦人病經先柴胡以行經之表次四物以行經之裡亦先氣而後血也不能飲而渴不能食而小便黃或澀皆因胃氣虛而生熱有形之物不入火炎上而渴戊就癸而化所以小便黃赤如棗汁法當補胃以錢仲陽白朮散乾葛木香藿香等藥治之上焦渴小便自利白虎湯中焦渴大小便不利調胃承氣湯下焦渴小便赤澀大便不利大承氣湯有六經發渴各隨經藥治之表熱惡熱而渴者白虎湯皮膚如火燎而以手重取之不甚熱者肺熱也或目白睛赤煩躁引飲單黃芩一物兩脅肌熱脈浮弦者柴胡飲子一身熱或日晡潮熱皆血熱也四順飲子夜則行陰若發熱者血熱也四順飲桃仁湯選而用之當視其有表入里腹痛血刺腹痛中無轉失氣之類晝則明瞭夜則譫語熱入血室無犯胃氣及上二焦不治自愈若甚則四順飲子桃仁承氣湯證相似當下者用之寅申發熱兩脅不盛亦為柴胡證表裡內外俱熱者大柴胡湯晝則行陽氣也柴胡夜則行陰血也四順治項後側少陽經中疙瘩不變肉色不問大小及月日深遠或有赤硬腫痛生山藥一挺去皮萆麻子二個去殼上二味研勻攤帛上貼之如聖兩手大熱為骨厥如在火可灸湧泉三壯或五壯立愈治臁刃及腳膝生瘡局方虛損門黃耆丸服之則愈定癰疽死之地方一伏兔二腓腨三背四五藏俞五項上六腦七髭八鬢九頤問三焦有幾血海異同手少陽三焦之經起於小指次指之外側出其端終於目鋭眥足少陽膽之經起於目鋭眥終足大指三毛頭至心為上焦心至臍為中焦臍至足為下焦此又足太陽之別也又靈樞云臍下膀胱至足為足三焦右手尺脈為命門包絡同疹此包絡亦有三焦之稱為命門之火遊行於五臟之間主持於內也手三焦主持上也足三焦主持下也上中下三焦通為一氣衛於身也為外護既已頭至心心至臍臍至足為狀也呼為三焦有名也以為無狀可呼經云三焦者水穀之道路也卻是有形狀何以然上焦者主內而不出中焦者主腐熱水穀下焦者主出而不納故經曰上焦如霧中焦如漚下焦如瀆也手經者主持上也足經者主持下也命門者主持中也為衛者護持外也三焦元氣為父之氣散也包絡相從母也並行而不相離母之元氣也故俱會於胸中經云膻中之分父母居之氣之海也如天地之尊不繫五形清邪中於上焦名曰潔也頭痛項強腰脊痛濁邪中於下焦名曰渾也陰氣為栗便溺妄出表虛里急上焦下焦與中焦相混上焦怫鬱臟氣相熏中焦不治胃氣上衝榮衛不通血凝不流若衛氣前通者小便赤黃與熱相搏因熱作使遊於經絡出入臟腑陰氣相通陽氣後微陰無所使客氣內入嚏而出之聲嗢音兀咽塞寒厥熱壅必然下血陰陽俱厥脾弱液下下焦不闔清便下重便數而難臍腸湫痛命將難全此命門之脈診在右手尺也經曰五臟不和五液注下當闔不闔便溺俱脫生氣絶矣所以腹臍湫痛也故曰命將難全前三焦自外而入後三焦自內而出如霧不散而為喘滿此出而不內也漚不利而為留飲留飲不散久為中滿上不能內下不能出也瀆不利而為腫滿此因上內而下不出也此三焦之所不歸也三焦有臟而無腑在內則遊行是在血也在外則固護是在氣也上焦如霧者氣也下焦如瀆者血也中焦者氣血分之也下焦在臍下膀胱上口主分別清濁出而不內即傳道也治在臍下名曰三焦其腑在氣衝中又云有臟無腑成氏云血室者血之所居也榮衛停止之所經脈流會之處衝脈是矣沖者奇經之一也起於腎下出於氣衝並足陽明經夾臍上行至胸中而散為諸經之會啓玄子云沖為血海諸經朝會男子則運而行之女子則停而止之皆謂之血室內經曰任脈通衝脈盛男既運行女既停止故運行者無積而不滿也停止者有積而能靜也不滿者陽也氣也能滿者陰也血也故滿者以時而溢為之信有期也溢動也乾道成男坤道成女故運行者陽之象也停止者陰之象也氣血榮衛男女皆有內外諧和其脈同疹脈者血之府也故為氣血之先室為藏物之舍亦為府也三焦之府在氣衝中為男女血海之府經又曰有臟而無腑從無形而言之有臟有腑從有形而言之也清邪濁邪所傷三焦齊病亦同兩感經云心包絡主之脈出胸中下膈歷絡三焦此其所以相與相火併行與命門之脈同疹於右尺中也陳氏五運六氣後有君火二論即陳蓬運氣圖也許先生論關中梁寬甫證右脅肺部也咳而唾血舉動喘促者肺疹也發熱脈數不能食者火來刑金肺與脾俱虛也肺脾虛而火乘之其病為逆如此者例不可補瀉蓋補金則慮金與火持而喘咳益增瀉火則慮火不退位而痃癖反盛正宜補中益氣湯也先狀元氣少少以治病藥和之聞已用藥而不獲效意必病勢苦逆而藥力未到也當與寬甫熟論遠期秋涼庶就使平復蓋肺病惡春夏火氣至秋冬則退也正宜於益氣湯中隨四時陰陽升降浮沉溫涼寒熱升降浮沉則順之寒熱溫涼則反之順其理和其氣為治之大方也及見有證增損服之或覺氣壅間服加減枳朮丸或有服間服加減枳朮湯數月後庶逆氣稍回逆氣回則治法可施但恐已至色青色赤脈弦脈洪則無及矣近世論醫有主河間劉氏者有主易州張氏者蓋張氏用藥依准四時陰陽升降而增損之正內經四氣調神之義醫而不知此是妄行也劉氏用藥務在推陳致新不使少有怫鬱正造化新新不停之義醫而不知此是無術也然而主張氏者或未盡張氏之妙則瞑眩之藥終莫敢投至失機後時而不救者多矣主劉氏者未悉劉氏之蘊則劫效目前陰損正氣遺禍於後日者多矣能用二家之長而無二家之弊則治法其庶幾乎論史副使病證史副使病不見色脈不能解料然以既愈復發言之則亦恐宜取張氏依准四時陰陽升降用藥以扶元氣庶他日既愈而遂愈也寬甫病候初感必深所傷物恐當時消導不盡停滯淹延變生他證以至於今恐亦宜仿劉氏推陳致新之意少加消導藥於益氣湯中庶有漸緩之期也圓明膏太醫王教授傳槐英半斤河水四斤浸二宿熬槐英取汁二升黃連四兩川芎防風各一兩當歸秦皮各二兩以上五味銼如緑豆大用河水六升浸一宿熬取汁三升將槐英渣並此五味渣再用水四升熬取二升通前共五升相合銅鍋內用木炭文武火熬入去䗶淨蜜四斤淨蜜法取蜜四升入鍋內微熬勿令滾其䗶沫盡浮在面上急取下以紙覆蜜面候冷取紙䗶自隨紙去再溫蜜熱以綿慮入藥汁內同煎一時許入下項飛石一十三兩金星石銀星石代赭石菩薩石寒水石紫石英雲母石並白礬少許同搗細滑石井泉石玄精石各一兩另研為細末黃丹三兩研令極細以上一十一味相合再研水飛焙乾共得一十三兩研開入藥汁內又熬一時入後淬石盧甘石二兩淬去石盧甘石不以多少用木炭火煆紅童子小便醮再煆紅再淬七次以碎為度再研水飛焙乾淨稱二兩入藥汁內又熬一時入下項藥銅緑半兩研青鹽半兩研雄豬膽七枚取汁白丁香一合水浸研取清汁鷹條三錢如取上汁用以上藥同熬萬轉成膏凡熬時用槐柳枝不住手攪勿令塵入鍋中須於淨室內熬膏盛入瓷器中假冷入下項細末藥不可熱熱則藥力去矣乳香沒藥輕粉蕤仁去皮各半兩用硃砂牛黃腦子血竭各一錢杏仁去皮半兩南硼砂一錢上件各別研令極細珍珠珊瑚紫貝硇砂石獬白礬緑礬朴硝各一錢盆硝半錢上用預留元熟清藥汁同研極細爛攪入藥中令勻如常法點之神效
