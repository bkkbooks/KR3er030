front:
  text: 後序東垣先生醫書一帙予府已鋟梓傳於世矣今又得一書亦東垣治疾之法名曰此事難知蓋醫之為道所以續斯人之命而與天地生生之德不可一朝泯也秦焚六經而廢周公孔子之道幸而醫書存世考諸經者則知黃帝與岐伯之論辯反復推明五運七氣之秘以立補泄之法所以拯斯人之疾而人之死生系焉岐黃既遠求能推諸五運七氣而察陰陽升降之候定臟腑虛實之所因合經絡上下之所屬而能起死回生者鮮矣噫克紹明之者其惟東垣先生乎先生是書乃言外不傳之秘誠為人所難知然方劑雖載其妙理有不可得而明言者在乎心領而神會耳唐許胤宗曰醫者意也思慮精則得之此之謂歟而孟軻氏曰梓匠輪輿能與人規矩不能與人之巧亦此謂也予用壽行而與四方之士共焉則濟人利物之一端未必無小補云成化甲辰歲仲夏既望荊南一人識
